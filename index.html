tr.innerHTML = `
  <td>${formatarIdManual(lanc.id_manual)}</td>

  <td>
    <select id="editObra_${lancId}" style="width:100%; height:22px; font-size:10px; margin:0; background:#fbefc1; border:1px solid #e2d6b5;">
      ${optionsObras}
    </select>
  </td>

  <td>
    <select id="editRegional_${lancId}" style="width:100%; height:22px; font-size:10px; margin:0; background:#fbefc1; border:1px solid #e2d6b5;">
      <option value="">Regional...</option>
      <option value="Curitiba">Curitiba</option>
      <option value="Londrina">Londrina</option>
    </select>
  </td>

  <td>
    <input type="month" id="editMes_${lancId}"
      value="${(lanc.mes || "").slice(0,7)}"
      style="width:100%; height:22px; font-size:10px; margin:0; background:#fbefc1; border:1px solid #e2d6b5;">
  </td>

  <td><input type="number" id="editMedMeta_${lancId}" step="0.01" value="${Number(lanc.medicoes_meta_controladoria ?? 0)}"></td>
  <td><input type="number" id="editCrono_${lancId}"   step="0.01" value="${Number(lanc.cronograma_fre ?? 0)}"></td>
  <td><input type="number" id="editMedReal_${lancId}"  step="0.01" value="${Number(lanc.medicoes_realizadas_mes ?? 0)}"></td>
  <td><input type="number" id="editProj_${lancId}"     step="0.01" value="${Number(lanc.projecao_mes ?? 0)}"></td>

  <td><input type="number" id="editCPlan_${lancId}"    step="0.01" value="${Number(lanc.custo_planejado_percentual ?? 0)}"></td>
  <td><input type="number" id="editCAgr_${lancId}"     step="0.01" value="${Number(lanc.custo_agregado_ac_percentual ?? 0)}"></td>

  <td><input type="number" id="editCRac_${lancId}"     step="0.01" value="${Number(lanc.custos_realizados_ac ?? 0)}"></td>
  <td><input type="number" id="editCComp_${lancId}"    step="0.01" value="${Number(lanc.custo_comprometido ?? 0)}"></td>
  <td><input type="number" id="editCTend_${lancId}"    step="0.01" value="${Number(lanc.custo_tendencia ?? 0)}"></td>
  <td><input type="number" id="editOT_${lancId}"       step="0.01" value="${Number(lanc.orcamento_termino ?? 0)}"></td>
  <td><input type="number" id="editEst_${lancId}"      step="0.01" value="${Number(lanc.estoque ?? 0)}"></td>

  <td class="tdAcoes">
    <div class="acoesWrap">
      <button class="btnAcao btnSalvar" onclick="salvarEdicaoLinha(${lancId})" title="Salvar">
        <svg viewBox="0 0 24 24"><path d="M9 16.2l-3.5-3.5L4 14.2l5 5 11-11-1.5-1.5z"/></svg>
      </button>
      <button class="btnAcao btnCancelar" onclick="cancelarEdicaoLinha()" title="Cancelar">
        <svg viewBox="0 0 24 24"><path d="M18.3 5.71L12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.29 19.71 2.88 18.29 9.17 12 2.88 5.71 4.29 4.29l6.3 6.3 6.29-6.3z"/></svg>
      </button>
    </div>
  </td>

  <td class="tdUsuarioLanc">${lanc.quem_lancou || ""}</td>
`;
